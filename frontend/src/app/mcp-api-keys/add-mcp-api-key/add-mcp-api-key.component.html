<div class="header">
    <div>
        <h1 class="h3">{{ 'app.mcpApiKeys.addMcpApiKey.header' | translate }}</h1>

        <a routerLink=".." class="btn-link" tabindex="0">
            <mat-icon>chevron_left</mat-icon>
            {{ 'app.mcpApiKeys.mcpApiKeys.title' | translate }}
        </a>
    </div>
</div>

<div class="content-center">
    <div class="card form">
        <div class="card-body">
            <form [formGroup]="form" (ngSubmit)="onSubmit()">
                <div class="mb-3">
                    <label for="name" class="form-label">{{ 'app.mcpApiKeys.addMcpApiKey.name' | translate }}</label>
                    <input id="name" type="text" formControlName="name" class="form-control" [class.is-invalid]="submitted() && f['name'].errors" />
                    <fingather-input-validator
                        [control]="f['name']"
                        [isSubmitted]="submitted()"
                        [errorMessages]="{
                            required: 'app.mcpApiKeys.addMcpApiKey.nameRequired',
                        }"
                    />
                </div>
                <div class="form-group buttons">
                    <a routerLink=".." class="btn btn-secondary" tabindex="0">{{ 'app.common.cancel' | translate }}</a>

                    <fingather-save-button
                        [saving]="saving()"
                    />
                </div>
            </form>
        </div>
    </div>
</div>
