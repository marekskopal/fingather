name: Backend

on:
    push:
        branches: [main]
    pull_request:
        paths:
            - 'backend/**'
            - '.github/workflows/backend.yml'

concurrency:
    group: backend-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    backend:
        name: Backend
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Cache composer dependencies
              uses: actions/cache@v4
              with:
                  path: backend/vendor
                  key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
                  restore-keys: ${{ runner.os }}-composer-

            - name: Build CI image
              run: |
                  docker build -t fingather-backend-ci -f - backend <<'EOF'
                  FROM dunglas/frankenphp:1.12.2-php8.5.5-alpine
                  COPY --from=mlocati/php-extension-installer:2.10.17 /usr/bin/install-php-extensions /usr/local/bin/
                  RUN install-php-extensions \
                      pdo_mysql \
                      bcmath \
                      sockets \
                      mbstring \
                      zip \
                      decimal-^1 \
                      simplexml \
                      gd \
                      igbinary \
                      redis
                  COPY --from=composer:2.9.7 /usr/bin/composer /usr/local/bin/composer
                  EOF

            - name: Install dependencies
              run: docker run --rm -v "$PWD/backend:/app" -w /app fingather-backend-ci composer install --prefer-dist --no-progress --no-interaction

            - name: Run PHPStan
              if: always()
              run: docker run --rm -v "$PWD/backend:/app" -w /app fingather-backend-ci vendor/bin/phpstan analyze --no-progress

            - name: Run PHPCS
              if: always()
              run: docker run --rm -v "$PWD/backend:/app" -w /app fingather-backend-ci vendor/bin/phpcs

            - name: Run PHPUnit
              if: always()
              run: docker run --rm -v "$PWD/backend:/app" -w /app fingather-backend-ci vendor/bin/phpunit
