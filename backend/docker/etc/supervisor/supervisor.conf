[supervisord]
nodaemon=true

[program:cron]
command=supercronic /etc/cron.d/fingather
autorestart=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true

[program:frankenphp]
command=frankenphp run --config /app/Caddyfile
autorestart=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true

[program:amqp-consumer]
command=php /app/src/amqp-consumer.php
autorestart=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true
